name: build-desktop

# 三平台桌面安装包(macOS .dmg / Windows .exe / Linux .AppImage)。
# 原生模块 better-sqlite3 必须在各自系统上编译,所以用 GitHub 的三种 runner 各编各的。
#
# 触发(刻意收紧——日常 push / PR 一律不触发,只在发布时跑):
#   - 推送 v* 版本 tag:跑测试 → 构建 → 自动创建/更新该 tag 的 GitHub Release 并附三平台安装包。
#   - 手动(Actions 页 Run workflow):跑测试 → 构建,产物在 Artifacts 里,不发 Release。
# 测试是构建的前置门禁:测试不过则不构建、不发布。

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 让 GITHUB_TOKEN 能创建 Release / 上传资产

jobs:
  # 门禁:类型检查 + 单测。失败则下游 build/release 不执行。
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tangu-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ebargs: --linux
          - os: windows-2022
            ebargs: --win
          - os: macos-latest        # Apple Silicon(arm64)。需 Intel 包再加一行:
            ebargs: --mac --arm64    #   { os: macos-13, ebargs: "--mac --x64" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ① 后端(standalone):编译出 dist/,会被 extraResources 打进 app 的 tangu-server/
      - name: Build backend
        working-directory: tangu-agent
        run: |
          npm install --no-audit --no-fund
          npm run build

      # ② 桌面壳(renderer/main/preload)→ out/
      - name: Build desktop shell
        working-directory: desktop
        run: |
          npm install --no-audit --no-fund
          npm run build

      # ③ 出安装包;afterPack 会把 better-sqlite3 重建为目标 Electron ABI
      # GITHUB_TOKEN:beforeBuild 的 fetch-python 调 GitHub API 拉内置 Python,未鉴权在 runner 上会 403 限流。
      - name: Package installer
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx electron-builder --config electron-builder.config.cjs ${{ matrix.ebargs }} --publish never

      # 防回归:v2.3.3~v2.6.0 曾因 beforeBuild 钩子返回 undefined(electron-builder 语义=「node_modules
      # 外部处理」)打出零依赖的空 asar——安装版启动即 ERR_MODULE_NOT_FOUND,且三平台静默过 CI。
      # 这里硬校验 asar 里真的有依赖(取 electron-updater 作哨兵,它缺=主进程必崩)。
      - name: Verify asar contains node_modules
        working-directory: desktop
        shell: bash
        run: |
          asar=$(find dist -type f -name app.asar | head -1)
          test -n "$asar" || { echo "::error::dist 下未找到 app.asar"; exit 1; }
          npx --yes @electron/asar list "$asar" | grep -q "^/node_modules/electron-updater/" \
            || { echo "::error::asar 缺 node_modules(beforeBuild 返回值语义回归?)— 该包启动即崩,拒绝发布"; exit 1; }

      # electron-builder 在有 publish 配置时随包产出更新 feed 清单(Win=latest.yml / Linux=latest-linux.yml);
      # 缺失则应用内更新形同虚设 → 这里硬失败,避免发出一个装不了更新的版本。
      # macOS 走 GitHub API 检测(未签名不自装),不依赖该 feed,故跳过校验。
      - name: Verify update manifests
        if: runner.os != 'macOS'
        working-directory: desktop
        shell: bash
        run: ls -1 dist/latest*.yml || { echo "::error::缺少 latest*.yml — 应用内更新 feed 未生成,请改用 --publish always(见 build.publish 配置)"; exit 1; }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: forsion-${{ matrix.os }}
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/latest*.yml
            desktop/dist/*.blockmap
          if-no-files-found: ignore

  # Android APK(Capacitor):随桌面 release 顺便出包。
  # 签名:配了 ANDROID_KEYSTORE_B64/_PASSWORD/_ALIAS/_KEY_PASSWORD 四个 secrets → 正式签名 release 包;
  # 未配 → debug 签名包(文件名带 -debug,可直接安装)。versionCode=run_number(升级安装恒递增),
  # versionName=tag 去 v 前缀。
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # mobile 经 vite alias 复用 desktop 渲染层/lcl/web 云模块 → 必须先装 desktop 依赖
      # (其 postinstall 顺带 link-lcl + 自托管 excalidraw 字体);web 云模块零外部依赖,无需装 web。
      - name: Install desktop deps (aliased renderer)
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Build web bundle + cap sync
        working-directory: mobile
        run: |
          npm install --no-audit --no-fund
          npm run build
          npx cap sync android

      - name: Build APK
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VN="${GITHUB_REF_NAME#v}"; else VN="0.0.0-ci.${GITHUB_RUN_NUMBER}"; fi
          export ANDROID_VERSION_NAME="$VN"
          chmod +x gradlew
          if [ -n "$ANDROID_KEYSTORE_B64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            export ANDROID_KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
            ./gradlew assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk "Forsion-Tangu-${VN}-android.apk"
          else
            echo "::notice::未配置 ANDROID_KEYSTORE_B64,产出 debug 签名 APK(可安装;配齐四个 secrets 后自动改出正式签名包)"
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk "Forsion-Tangu-${VN}-android-debug.apk"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forsion-android
          path: mobile/android/Forsion-Tangu-*.apk

  # 仅在打 v* tag 时:收集三平台产物(+APK)→ 创建/更新对应 Release 并附件。
  # APK 是「顺便」:build-android 失败不挡桌面发版(always + 只硬依赖 build 成功)。
  release:
    needs: [build, build-android]
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # 三个 artifact 的文件平铺到 artifacts/

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # 已存在则补传并覆盖资产(支持重跑);不存在则新建(自动生成发布说明)。
          gh release create "$TAG" artifacts/* --title "Forsion $TAG" --generate-notes \
            || gh release upload "$TAG" artifacts/* --clobber
