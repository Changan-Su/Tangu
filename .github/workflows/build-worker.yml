# 构建 Tangu 云端 worker 镜像 → 推 ghcr.io,生产服务器 pull 后重建容器。
# 此前 worker 从服务器上一个 Genesis 迁移前的旧 Tangu checkout 手工构建,停在 2026-06-18 —— 引擎
# 新增的 app profile(如 tangu)/端点全都缺,表现为 /agent/runs 400 unknown app_id。
# worker 插件是独立私仓 Changan-Su/Tangu-Worker(本仓 .gitignore 刻意排除,开源边界):
# 经 TANGU_WORKER_DEPLOY_KEY secret(该私仓的只读 deploy key)checkout 后放进构建上下文。
# 触发:手动 Run workflow(worker 部署是慎重动作);Dockerfile/本文件改动推 main 也触发。secret 就绪于 2026-07-17。
name: build-worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tangu-agent/Dockerfile'
      - '.github/workflows/build-worker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout worker plugin (私仓 Tangu-Worker)
        uses: actions/checkout@v4
        with:
          repository: Changan-Su/Tangu-Worker
          ssh-key: ${{ secrets.TANGU_WORKER_DEPLOY_KEY }}
          path: tangu-agent/plugins/forsion-worker
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image name (ghcr 要求全小写)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/forsion-tangu-worker" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: tangu-agent
          file: tangu-agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
