<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:;" />
    <title>Tangu Agent</title>
    <script>
      // FOUC 防护:React 挂载前按 localStorage 设 data-theme/.dark/data-glass,
      // 避免主题/暗色闪烁。preset 合法性由 registry 启动后兜底纠正。
      (function () {
        try {
          var preset = localStorage.getItem('forsion_theme_preset') || 'sozhi';
          var mode = localStorage.getItem('forsion_theme') === 'dark' ? 'dark' : 'light';
          var glass = localStorage.getItem('forsion_glass') === 'off' ? 'off' : 'on';
          var root = document.documentElement;
          root.dataset.theme = preset;
          root.dataset.mode = mode;
          root.dataset.glass = glass;
          if (mode === 'dark') root.classList.add('dark');
          // 首帧背景:素纸宣纸白 / 夜读暖黑(其它主题由其 CSS 接管)。
          root.style.background = mode === 'dark' ? '#211D18' : '#F5EFE4';
        } catch (e) { /* private mode */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
