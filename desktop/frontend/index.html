         且 'unsafe-inline' 已在,eval 不扩大 XSS 面),删掉它=所有外置插件 setup 失败。 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; connect-src 'self' http://localhost:* http://127.0.0.1:* https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: amadeus-asset: https:; media-src 'self' blob: amadeus-asset: https:; frame-src 'self' amadeus-asset: https://www.youtube-nocookie.com http://127.0.0.1:* http://localhost:*;" />
    <title>Forsion</title>
    <script>
      // FOUC 防护:React 挂载前按 localStorage 设 data-theme(语言)/data-skin(配色)/.dark/data-glass,
      // 避免主题/暗色闪烁。合法性由 registry 启动后兜底纠正。双轴 = 语言(lovable/soft) × 配色(cream/coral/teal/lavender/custom)。
      (function () {
        try {
          // 明暗偏好 pref(可 system=跟随系统):forced_scheme(主题锁定值)优先,再 pref,再老键。
          // 每个候选都校验合法值(与 registry 一致),避免脏值(如 'rainbow')被当成 system 而与 store 解析分叉。
          var VM = { light: 1, dark: 1, system: 1 };
          var forced = localStorage.getItem('forsion_theme_forced_scheme');
          var prefRaw = localStorage.getItem('forsion_theme_pref');
          var legacy = localStorage.getItem('forsion_theme');
          var pref = VM[forced] ? forced : (VM[prefRaw] ? prefRaw : ((legacy === 'light' || legacy === 'dark') ? legacy : 'light'));
          // system → 立刻按系统明暗解析,避免首帧闪(store 合并磁盘 manifest 后会再核一次)。
          var mode = pref === 'dark' ? 'dark' : pref === 'light' ? 'light'
            : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
          var glass = localStorage.getItem('forsion_glass') === 'off' ? 'off' : 'on';
          var flat = localStorage.getItem('forsion_theme_flat') !== '0' ? '1' : '0';
          // 旧单轴 preset → (语言,配色) 迁移兜底(新键缺失时)。
          var MIG = { lovable: ['lovable', 'cream'], echo: ['lovable', 'coral'], qbird: ['lovable', 'teal'], dreamer: ['soft', 'lavender'], custom: ['lovable', 'custom'] };
          var legacy = MIG[localStorage.getItem('forsion_theme_preset')] || null;
          var lang = localStorage.getItem('forsion_theme_lang') || (legacy ? legacy[0] : 'lovable');
          // 磁盘主题(soft/用户主题)的结构 CSS 首屏尚未注入 → data-theme 先乐观设上(skin/明暗/底色仍正确),
          // registry 启动后合并并重应用其结构;只挡明显非法 id。
          if (!/^[a-z0-9-]+$/.test(lang)) lang = 'lovable';
          var skin = localStorage.getItem('forsion_theme_skin') || (legacy ? legacy[1] : 'cream');
          if (['cream', 'coral', 'teal', 'lavender', 'custom'].indexOf(skin) < 0) skin = 'cream';
          var root = document.documentElement;
          root.dataset.theme = lang;
          root.dataset.skin = skin;
          root.dataset.mode = mode;
          root.dataset.glass = glass;
          root.dataset.flat = flat;
          if (mode === 'dark') root.classList.add('dark');
          // 首帧背景按配色取纯色底,防闪烁(skins.css 接管后即一致;custom 亮色优先用户自选背景色)。
          var BG = {
            cream: ['#f8f7f6', '#2a292b'], coral: ['#fbf5ef', '#19131a'], teal: ['#f5f5f7', '#1c1c1e'],
            lavender: ['#f4eef7', '#1e1a29'], custom: ['#f6f6f7', '#1b1b1d']
          };
          var customBg = skin === 'custom' && mode !== 'dark' ? localStorage.getItem('forsion_theme_bg_seed') : null;
          root.style.background = customBg || (BG[skin] || BG.cream)[mode === 'dark' ? 1 : 0];
        } catch (e) { /* private mode */ }
      })();
    </script>

    <style id="tangu-splash-style">
      /* 启动闪屏(白屏过渡):底色取动画 stage 底色 #fbf8f5;logo 动画 1600ms 后整层淡出。 */
      #tangu-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #fbf8f5;
        animation: tangu-splash-out 2100ms both;
      }
      #tangu-splash .tangu-splash-logo { width: 184px; height: 184px; }
      @keyframes tangu-splash-out {
        0%, 76% { opacity: 1; visibility: visible; }   /* ~1600ms 动画跑完前保持 */
        100% { opacity: 0; visibility: hidden; }       /* 末 ~500ms 淡出 */
      }
      :root {
        --p2m-duration: 1600ms;
        --p2m-ease-enter: cubic-bezier(0.4, 0, 0.6, 1);
        --p2m-ease-settle: cubic-bezier(0.16, 1, 0.3, 1);
        --p2m-ease-narrative: cubic-bezier(0.34, 0, 0.14, 1);
        --p2m-overshoot: 1.012;
      }

      #tangu-splash #panel-stack,
      #tangu-splash #tree-mark,
      #tangu-splash #tree-outline {
        transform-box: fill-box;
        will-change: transform, opacity, filter, clip-path;
      }

      #tangu-splash #panel-stack {
        transform-origin: center;
        animation: p2m-panel var(--p2m-duration) linear both;
      }

      #tangu-splash #tree-mark {
        transform-origin: 50% 100%;
        animation: p2m-tree var(--p2m-duration) linear both;
      }

      #tangu-splash #tree-outline {
        stroke-dasharray: 1 1;
        stroke-dashoffset: 1;
        animation: p2m-outline var(--p2m-duration) linear both;
      }

      @keyframes p2m-panel {
        0% {
          opacity: 0;
          filter: blur(14px);
          transform: scale(0.88);
          animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); /* elegant enter */
        }
        20% {
          opacity: 0.22;
          filter: blur(10px);
          transform: scale(0.855);
          animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); /* narrative release */
        }
        62% {
          opacity: 1;
          filter: blur(0);
          transform: scale(var(--p2m-overshoot));
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); /* settle */
        }
        82% {
          opacity: 1;
          filter: blur(0);
          transform: scale(0.997);
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); /* settle */
        }
        100% {
          opacity: 1;
          filter: none;
          transform: scale(1);
        }
      }

      @keyframes p2m-tree {
        0%, 20% {
          opacity: 0;
          clip-path: inset(100% 0 0 0);
          transform: translateY(30px) scale(0.94);
          animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); /* narrative release */
        }
        68% {
          opacity: 1;
          clip-path: inset(0 0 0 0);
          transform: translateY(-7px) scale(1.012);
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); /* settle */
        }
        84% {
          opacity: 1;
          clip-path: inset(0 0 0 0);
          transform: translateY(1px) scale(0.998);
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); /* settle */
        }
        100% {
          opacity: 1;
          clip-path: inset(0 0 0 0);
          transform: none;
        }
      }

      @keyframes p2m-outline {
        0%, 42% {
          opacity: 0;
          stroke-dashoffset: 1;
          animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); /* natural draw */
        }
        52% {
          opacity: 0.48;
          stroke-dashoffset: 0.92;
          animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); /* natural draw */
        }
        84% {
          opacity: 0.34;
          stroke-dashoffset: 0;
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); /* settle */
        }
        100% {
          opacity: 0;
          stroke-dashoffset: 0;
        }
      }

      /* 暗色模式:舞台底换暖深色;LOGO 奶油砖保持品牌原样(用户拍板)。data-mode 由上方 FOUC 脚本先行设好。 */
      html[data-mode="dark"] #tangu-splash { background: #252327; }

      @media (prefers-reduced-motion: reduce) {
        #tangu-splash { animation-duration: 700ms; }
        #tangu-splash #panel-stack,
        #tangu-splash #tree-mark,
        #tangu-splash #tree-outline { animation: none; }
        #tangu-splash #tree-outline { opacity: 0; }
      }
    </style>
